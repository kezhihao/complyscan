# ComplyScan - Cloudflare Workers Configuration

name = "complyscan-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Environment variables (secrets set via: wrangler secret put <NAME>)
# [vars]
# ENVIRONMENT = "development"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "complyscan-db"
database_id = "YOUR_D1_DATABASE_ID"  # Run: wrangler d1 create complyscan-db

# R2 Storage (for reports, exports)
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "complyscan-storage"  # Run: wrangler r2 bucket create complyscan-storage

# KV Cache (for rate limiting, session data)
[[kv_namespaces]]
binding = "CACHE"
id = "YOUR_KV_ID"  # Run: wrangler kv namespace create complyscan-cache

# CORS settings for GitHub integration
# Routes configuration - uncomment when using custom domain
# [[routes]]
# pattern = "api.complyscan.com/*"
# zone_name = "complyscan.com"
